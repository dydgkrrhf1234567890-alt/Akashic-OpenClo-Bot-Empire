name: ADVC OpenClo Robot Cycle

on:
workflow_dispatch: # ★이게 버튼을 만드는 핵심 주문입니다!
schedule:
- cron: '0 * * * *' # 매시간 자동 사냥

jobs:
hunt:
runs-on: ubuntu-latest
steps:
- name: Checkout Code
uses: actions/checkout@v4

- name: Setup Python
uses: actions/setup-python@v5
with:
python-version: '3.10'

- name: Install Requests
run: pip install requests

- name: Run Robot v3
env:
X_API_KEY: ${{ secrets.X_API_KEY }}
TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
# 파일명이 OpenClo_Ultimate_Core.py 가 맞는지 꼭 확인하소서!
run: python OpenClo_Ultimate_Core.py

- name: Commit Results
run: |
git config --local user.email "action@github.com"
git config --local user.name "GitHub Action"
git add revenue_data.json
git commit -m "Coagulation: Update revenue [M♥R]" || echo "No changes"
git push
