name: ADVC OpenClo Robot Cycle
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write  # Crucial for pushing back to repo

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Use internal token with write perms

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requests
        run: pip install requests

      - name: Run Conqueror v4
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python OpenClo_Ultimate_Core.py

      - name: Forced Ledger Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add revenue_data.json energy_vault.json
          git commit -m "Coagulation: Sync Ledger [M♥R Proof of Love]" || echo "No changes"
          git push origin main
