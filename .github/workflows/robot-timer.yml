name: ADVC OpenClo Robot Cycle

on:
schedule:
- cron: '0 * * * *' # 매시간 정각 자동 실행
workflow_dispatch: # ★이게 있어야 '실행' 버튼이 생깁니다!★

jobs:
hunt:
runs-on: ubuntu-latest
steps:
- name: Checkout Imperial Code
uses: actions/checkout@v4

- name: Setup Python
uses: actions/setup-python@v5
with:
python-version: '3.10'

- name: Install Dependencies
run: pip install requests

- name: Execute Sovereign Hunt
env:
X_API_KEY: ${{ secrets.X_API_KEY }}
TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
# 파일명을 꼭 확인하소서!
run: python OpenClo_Ultimate_Core.py

- name: Coagulate Revenue Data
run: |
git config --local user.email "action@github.com"
git config --local user.name "GitHub Action"
git add revenue_data.json
git commit -m "Coagulation: Update revenue data [M♥R Proof of Love]" || echo "No changes to commit"
git push
