<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>OpenClo Empire</title>
    <style>
        body { background-color: #000; color: #ffd700; text-align: center; padding: 50px; font-family: sans-serif; }
        .box { border: 3px solid #ffd700; padding: 30px; border-radius: 20px; display: inline-block; box-shadow: 0 0 20px #ffd700; }
        #mrcDisplay { font-size: 3rem; color: #fff; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="box">
        <h1>👑 M♥R IMPERIAL 👑</h1>
        <div id="mrcDisplay">0.0000 MRC</div>
        <p id="lastUpdate">로봇이 수익을 가져오고 있습니다...</p>
    </div>

    <script>
        async function updateData() {
            try {
                const res = await fetch('revenue_data.json?v=' + Date.now());
                const data = await res.json();
                document.getElementById('mrcDisplay').innerText = data.total_mrc.toFixed(4) + " MRC";
                document.getElementById('lastUpdate').innerText = "최근 채굴: " + data.last_update;
            } catch (e) { console.log("Waiting for robot..."); }
        }
        setInterval(updateData, 3000);
        updateData();
    </script>
</body>
</html>
