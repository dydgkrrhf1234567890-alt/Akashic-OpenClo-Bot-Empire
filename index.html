<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADVC M♥R Akashic OpenClo Empire</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background-color: #0c0c1a; color: #f5f5f7; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; border: 1px solid #333; padding: 30px; border-radius: 20px; box-shadow: 0 0 50px rgba(86, 255, 154, 0.1); }
        h1 { color: #aadfaa; text-shadow: 0 0 15px #56ff9a; font-size: 2rem; }
        .robot-status { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 15px; margin: 15px 0; border-left: 5px solid #77bfa3; }
        .mrc-value { font-size: 2.5rem; color: #ffcc00; font-weight: bold; }
        button { padding: 18px; font-size: 1.2rem; cursor: pointer; border-radius: 50px; border: none; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-connect { background: #556f9e; color: white; }
        .btn-claim { background: #56ff9a; color: #05130b; box-shadow: 0 0 15px #56ff9a; display: none; }
        #txLog { margin-top: 20px; color: #aaffaa; font-size: 0.8rem; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💎 AKASHIC OPENCLO EMPIRE 💎</h1>
        <div class="robot-status">
            <p>🤖 오픈클로 로봇 수익 채굴 중...</p>
            <div class="mrc-value" id="mrcDisplay">144.8100</div>
        </div>
        <button id="connectBtn" class="btn-connect" onclick="connectWallet()">🦊 지갑 연결하여 입장</button>
        <button id="claimBtn" class="btn-claim" onclick="claimReward()">💰 실물 자산 현신 (0.01 POL)</button>
        <div id="txLog"></div>
    </div>
    <script>
        let userAccount = ""; let mrc = 144.81;
        setInterval(() => { mrc += 0.0001; document.getElementById('mrcDisplay').innerText = mrc.toFixed(4); }, 1000);
        async function connectWallet() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    userAccount = accounts[0];
                    document.getElementById('connectBtn').style.display = 'none';
                    document.getElementById('claimBtn').style.display = 'block';
                    document.getElementById('txLog').innerHTML = "✅ 연결 성공: " + userAccount.substring(0,10) + "...";
                } catch (err) { alert("연결 거부!"); }
            } else { alert("메타마스크 브라우저 필수!"); }
        }
        async function claimReward() {
            const log = document.getElementById('txLog'); const btn = document.getElementById('claimBtn');
            try {
                btn.disabled = true; btn.innerText = "⏳ 승인 대기...";
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const signer = provider.getSigner();
                const tx = { to: userAccount, value: ethers.utils.parseEther("0.01") };
                const transaction = await signer.sendTransaction(tx);
                log.innerHTML = "🚀 전송 중! 해시: " + transaction.hash.substring(0,25) + "...";
                await transaction.wait();
                log.innerHTML = "✅ 현신 성공! 입금 완료!";
                btn.innerText = "출금 성공 ✨";
            } catch (err) { log.innerHTML = "❌ 실패: " + (err.reason || "취소됨"); btn.disabled = false; btn.innerText = "다시 시도"; }
        }
    </script>
</body>
</html>
