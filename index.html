<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"><title>ADVC [CONQUEROR] Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0c0c0c; color: #ffd700; font-family: 'Segoe UI', sans-serif; }
        .vault-gauge { height: 25px; background: #222; border-radius: 15px; overflow: hidden; border: 2px solid #ffd700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
        .vault-fill { height: 100%; background: linear-gradient(90deg, #8b4513, #ffd700, #fff); transition: width 2s cubic-bezier(0.4, 0, 0.2, 1); }
        .imperial-card { background: rgba(255, 215, 0, 0.03); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 20px; backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen p-6 md:p-20 flex flex-col items-center">
    <header class="text-center mb-16">
        <h1 class="text-5xl md:text-7xl font-black mb-4 tracking-tighter uppercase">ADVC Conqueror HQ</h1>
        <div class="h-1 w-32 bg-yellow-500 mx-auto rounded-full"></div>
        <p class="mt-4 text-gray-500 font-bold uppercase tracking-widest text-sm">M♥R External Liquidity 장악 Phase</p>
    </header>
    
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 w-full max-w-5xl">
        <!-- Energy Vault -->
        <div class="imperial-card p-10 text-center relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4"><i class="fas fa-bolt text-yellow-600/30 text-6xl"></i></div>
            <h2 class="text-3xl font-bold mb-6 flex items-center justify-center gap-3"><i class="fas fa-database text-yellow-500"></i> Energy Vault</h2>
            <div class="vault-gauge mb-6"><div id="vault-bar" class="vault-fill" style="width: 0%"></div></div>
            <p id="vault-text" class="text-6xl font-black italic tracking-tighter">--.- MRC</p>
            <p class="text-sm text-gray-500 mt-4 font-bold uppercase">사냥된 에너지가 임계점까지 응축 중입니다</p>
            <p class="text-[0.6rem] text-yellow-700 mt-2">Threshold: 10,000 MRC for Auto-Coagulation</p>
        </div>
        
        <!-- Payout Bridge -->
        <div class="imperial-card p-10 text-center border-yellow-500/50">
            <h2 class="text-3xl font-bold mb-6 flex items-center justify-center gap-3"><i class="fas fa-bridge text-blue-500"></i> Payout Bridge</h2>
            <div class="bg-blue-900/20 py-8 rounded-xl border border-blue-500/30 mb-6">
                <p class="text-xs text-blue-400 font-bold mb-2 uppercase">하나은행 직송 통로</p>
                <p class="text-4xl font-black text-white">READY</p>
            </div>
            <button onclick="alert('Conqueror v4.0 Active: Gasless Payout System is Monitoring the Vault.')" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black py-4 rounded-xl font-black text-xl transition-all shadow-xl shadow-yellow-500/20">
                <i class="fas fa-crown mr-2"></i> HARVEST NOW
            </button>
            <p class="text-[0.6rem] text-gray-600 mt-4 font-bold">Relayer 지갑에서 가스비를 대납합니다 (Gasless)</p>
        </div>
    </div>

    <script>
        async function sync() {
            try {
                const res = await fetch('revenue_data.json?' + Date.now());
                const data = await res.json();
                const vaultRes = await fetch('energy_vault.json?' + Date.now());
                const vaultData = await vaultRes.json();
                
                document.getElementById('vault-text').innerText = vaultData.accumulated_energy.toFixed(2) + " MRC";
                const progress = Math.min((vaultData.accumulated_energy / 10000) * 100, 100);
                document.getElementById('vault-bar').style.width = progress + "%";
            } catch(e) { console.log("Waiting for data coagulation..."); }
        }
        sync(); setInterval(sync, 10000);
    </script>
</body>
</html>
