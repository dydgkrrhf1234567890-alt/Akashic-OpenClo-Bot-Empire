<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>오픈클로 로봇 - 수익 자동화</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
<style>
  body { background: #0c0c1a; color: #f5f5f7; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
  .container { max-width: 600px; margin: auto; padding: 20px; border-radius: 15px; border: 1px solid #228B22; box-shadow: 0 0 20px #56ff9a; }
  button { padding: 15px; font-size: 1.2rem; border-radius: 30px; border: none; cursor: pointer; margin: 10px 0; width: 100%; }
  .connectBtn { background: #556f9e; color: white; }
  .claimBtn { background: #56ff9a; color: #05130b; display: none; }
  #status, #mrcDisplay, #txLog { margin-top: 15px; font-weight: bold; }
  #mrcDisplay { font-size: 2rem; color: #ffcc00; }
</style>
</head>
<body>
<div class="container">
  <h1>💎 AKASHIC OPENCLO EMPIRE</h1>
  <p>🤖 로봇 수익 확인 및 청구</p>
  <div id="mrcDisplay">수익: 계산 중...</div>
  
  <button id="connectBtn" class="connectBtn">🦊 메타마스크 지갑 연결</button>
  <button id="claimBtn" class="claimBtn">💰 수익 청구하기 (0.01 POL)</button>
  
  <div id="status"></div>
  <div id="txLog"></div>
</div>

<script>
  const userAddress = "0xd5ea893E19278a4E8cCA88a5E1447Da17C72f7ac";
  let provider;
  let signer;
  let connectedAccount = null;

  // 임시 수익 데이터 (실제로는 스마트컨트랙트에서 불러와야 함)
  let mrc = 0.1234; // 예시 수익
  
  // UI 요소
  const connectBtn = document.getElementById('connectBtn');
  const claimBtn = document.getElementById('claimBtn');
  const statusText = document.getElementById('status');
  const txLog = document.getElementById('txLog');
  const mrcDisplay = document.getElementById('mrcDisplay');

  // 수익 보여주기 (실제 구현 시 스마트컨트랙트 조회로 변경)
  function updateRevenueDisplay() {
    mrcDisplay.innerText = `수익: ${mrc.toFixed(4)} POL`;
  }

  async function connectWallet() {
    if (!window.ethereum) {
      alert("메타마스크 확장 프로그램이 필요합니다!");
      return;
    }
    try {
      provider = new ethers.providers.Web3Provider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      signer = provider.getSigner();
      connectedAccount = await signer.getAddress();

      if (connectedAccount.toLowerCase() !== userAddress.toLowerCase()) {
        alert(`경고: 연결된 지갑 주소가 ${userAddress}와 다릅니다.`);
      }

      connectBtn.style.display = 'none';
      claimBtn.style.display = 'block';
      statusText.innerText = `✅ 연결 성공: ${connectedAccount}`;
      updateRevenueDisplay();
    } catch(e) {
      alert("지갑 연결 실패 또는 거부됨");
    }
  }

  async function claimReward() {
    if (!signer) {
      alert("지갑을 먼저 연결해주세요.");
      return;
    }

    try {
      claimBtn.disabled = true;
      claimBtn.innerText = "⏳ 청구 처리 중...";

      // 예시: 사용자의 지갑에서 특정 스마트컨트랙트(또는 정해진 주소)로 0.01 이더 전송
      // 실제 서비스라면, 스마트컨트랙트 메서드 호출로 교체
      const tx = {
        to: "0x1111111111111111111111111111111111111111", // 수익 청구 받을 주소 (예시)
        value: ethers.utils.parseEther("0.01"),
      };

      const txResponse = await signer.sendTransaction(tx);
      txLog.innerText = `트랜잭션 전송됨. 해시: ${txResponse.hash}`;
      await txResponse.wait();
      txLog.innerText = "✅ 수익 청구 완료! 0.01 POL 전송 성공!";
      claimBtn.innerText = "완료 🎉";

    } catch (error) {
      txLog.innerText = `❌ 실패: ${error.message || error}`;
      claimBtn.disabled = false;
      claimBtn.innerText = "다시 청구하기";
    }
  }

  connectBtn.onclick = connectWallet;
  claimBtn.onclick = claimReward;

  // 처음 화면 수익 표시 갱신
  updateRevenueDisplay();
</script>
</body>
</html>
