<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADVC M♥R Akashic OpenClo Empire</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.7.2.umd.min.js" type="application/javascript"></script>
    <style>
        body { background-color: #0c0c1a; color: #f5f5f7; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        .container { max-width: 800px; margin: auto; border: 1px solid #333; padding: 40px; border-radius: 20px; box-shadow: 0 0 50px rgba(86, 255, 154, 0.1); }
        h1 { color: #aadfaa; text-shadow: 0 0 15px #56ff9a; font-size: 2.5rem; }
        .robot-status { background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 15px; margin: 20px 0; border-left: 5px solid #77bfa3; }
        .mrc-value { font-size: 3rem; color: #ffcc00; font-weight: bold; margin: 10px 0; }
        button { padding: 15px 40px; font-size: 1.2rem; cursor: pointer; border-radius: 50px; border: none; transition: 0.3s; font-weight: bold; }
        .btn-connect { background: #556f9e; color: white; margin-bottom: 20px; }
        .btn-claim { background: #77bfa3; color: #05130b; box-shadow: 0 0 20px #77bfa3; }
        .btn-claim:disabled { background: #444; color: #888; cursor: not-allowed; box-shadow: none; }
        #txLog { margin-top: 30px; font-family: monospace; color: #aaffaa; font-size: 0.9rem; }
        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }
        .live-dot { display: inline-block; width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, #56ff9a, transparent); animation: pulse 1s infinite alternate; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💎 AKASHIC OPENCLO EMPIRE 💎</h1>
        <p>M♥R Imperial Foundation | OpenClo Robot Working...</p>
        
        <div class="live-dot"></div>
        
        <div class="robot-status">
            <h3>🤖 오픈클로 로봇 가동 상태: <span style="color:#56ff9a">OPTIMIZED</span></h3>
            <p>현재 로봇이 아카식 레코드에서 수익을 채굴 중입니다...</p>
            <div class="mrc-value" id="mrcDisplay">144.8100</div>
            <p style="color:#888">$ <span id="usdDisplay">144.81</span> USD</p>
        </div>

        <div id="walletSection">
            <button class="btn-connect" onclick="connectWallet()">메타마스크 지갑 연결하여 입장</button>
        </div>

        <div id="actionSection" style="display:none">
            <p>📜 연결된 지갑: <span id="userAddress" style="color:#aadfaa"></span></p>
            <button class="btn-claim" id="claimBtn" onclick="claimReward()">실물 자산 출금 (Claim Reward)</button>
        </div>

        <div id="txLog"></div>
    </div>

    <script>
        let mrc = 144.81;
        setInterval(() => {
            mrc += 0.0001;
            document.getElementById('mrcDisplay').innerText = mrc.toFixed(4);
            document.getElementById('usdDisplay').innerText = mrc.toFixed(2);
        }, 1000);

        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
                    document.getElementById('userAddress').innerText = accounts[0].substring(0,10) + '...';
                    document.getElementById('walletSection').style.display = 'none';
                    document.getElementById('actionSection').style.display = 'block';
                } catch (err) {
                    alert('지갑 연결에 실패했습니다.');
                }
            } else {
                alert('메타마스크를 설치해주세요!');
            }
        }

        async function claimReward() {
            const btn = document.getElementById('claimBtn');
            const log = document.getElementById('txLog');
            btn.disabled = true;
            btn.innerText = '자산 응고 중 (Claiming...)';
            
            setTimeout(() => {
                const txHash = '0x' + Math.random().toString(16).slice(2) + Math.random().toString(16).slice(2);
                log.innerHTML = `<p>✅ 트랜잭션 현신 완료!</p><p style="word-break:break-all">${txHash}</p>`;
                alert('보상을 성공적으로 청구했습니다!');
                btn.innerText = '출금 완료';
            }, 3000);
        }
    </script>
</body>
</html>
